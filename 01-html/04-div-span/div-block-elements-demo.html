<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Div Element</title>
  </head>
  <body>
    <!-- without div element -->
    <a href="https://www.youtube.com/">youtube</a>
    <a href="https://www.crunchyroll.com/">Crunchyroll</a>

    <!-- with div element -->
    <div>
      <a href="https://www.youtube.com/">youtube</a>
    </div>
    <div>
      <a href="https://www.crunchyroll.com/">Crunchyroll</a>
    </div>
  </body>
</html>
