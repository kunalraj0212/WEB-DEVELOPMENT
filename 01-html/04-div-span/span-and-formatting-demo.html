<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><b>Span element;<sub>Hr tag;</sub>  sub & sup tag</b> </title>
  </head>
  <body>
    <!-- without span -->
    <p>Hello,</p>
    <p>I am Kunal &</p>
    <p>I love coding</p>

    <!-- with span element -->
    <span style="color: red;">
        <p>Hello, </p>  
        <p>I am Kunal & </p>
        <p>I love coding</p>   
    </span>

    <hr>

    <p>H<sub style="color: red;">2</sub>O is water</p>

  </body>
</html>
