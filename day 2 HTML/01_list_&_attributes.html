<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in HTML</title>
</head>
<body>
    <!-- unordered list -->
     <ul>
        <h2>Things To BUY...</h2> 
        <li>Bread</li>

     <ol type = "A">
        <li>frooti</li>
        <li>diet coke</li>
        <li>protein bar</li>
     <ol>   

</body>
</html>
